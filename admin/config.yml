backend:
  name: git-gateway
  branch: main

publish_mode: simple
locale: ar

media_folder: "assets/images"
public_folder: "assets/images"

collections:
  - name: menu
    label: قائمة الطعام
    files:
      - file: data/menu.json
        name: menu_data
        label: بيانات القائمة
        fields:
          - name: categories
            label: الفئات
            widget: list

          - name: items
            label: العناصر
            widget: list
            fields:
              - { name: id, label: ID, widget: number }
              - { name: name, label: الاسم, widget: string }
              - { name: category, label: الفئة, widget: string }
              - { name: description, label: الوصف, widget: text }
              - { name: price, label: السعر, widget: number }
              - { name: image, label: الصورة, widget: image, required: false }
              - { name: available, label: متاح, widget: boolean }